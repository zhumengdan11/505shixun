<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>校内大模型对话平台（实训作业）</title>
    <style>
        .box{width:800px;margin:30px auto;}
        textarea{width:100%;height:100px;padding:10px;font-size:16px}
        button{margin-top:10px;padding:8px 20px;font-size:16px;cursor:pointer}
        #result{margin-top:20px;padding:15px;border:1px solid #ccc;min-height:150px;white-space:pre-wrap}
    </style>
</head>
<body>
    <div class="box">
        <h2>校园内网Qwen3大模型问答系统</h2>
        <textarea id="inputText" placeholder="请输入提问，例如：介绍下你自己"></textarea>
        <button onclick="sendChat()">提交提问</button>
        <h3>AI返回结果：</h3>
        <div id="result"></div>
    </div>

    <script>
        async function sendChat(){
            const text = document.getElementById("inputText").value
            const resDom = document.getElementById("result")
            resDom.innerText = "正在请求校内接口，请稍候..."
            const resp = await fetch("/api/chat", {
                method: "POST",
                headers: {"Content-Type":"application/json"},
                body: JSON.stringify({text})
            })
            const data = await resp.json()
            if(data.success){
                const reply = data.data.choices[0].message.content
                resDom.innerText = reply
            }else{
                resDom.innerText = "错误："+data.msg + "\n详情："+data.detail
            }
        }
    </script>
</body>
</html>
